# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: aid

builds:
  - id: aid
    binary: aid
    main: ./cmd/aid
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: aid
    ids:
      - aid
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  mode: keep-existing

changelog:
  disable: true

source:
  enabled: false
